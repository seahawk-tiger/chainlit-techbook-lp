<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chainlit技術書 — 特設ページ</title>
  <meta name="description" content="Chainlitの技術書同人誌の特設ページです。">

  <!-- OGP -->
  <meta property="og:title" content="Chainlit技術書">
  <meta property="og:description" content="Chainlitの技術書同人誌の特設ページです。">
  <meta property="og:type" content="website">
  <meta property="og:image" content="assets/images/ogp.png">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Hero -->
  <section id="hero" class="hero">
    <div class="container">
      <div class="hero-inner">
        <div class="hero-text">
          <h1 class="hero-title">Chainlit技術書</h1>
          <p class="hero-subtitle">キャッチコピーが入ります</p>
          <a href="#purchase" class="btn btn-primary">入手する</a>
        </div>
        <div class="hero-image">
          <img src="assets/images/cover.png" alt="書影" width="300" height="424">
        </div>
      </div>
    </div>
  </section>

  <!-- About -->
  <section id="about" class="section">
    <div class="container">
      <h2 class="section-title">この本について</h2>
      <p class="section-body">
        この本の概要が入ります。Chainlitを使って何ができるのか、どんな読者に向けた本なのかを簡潔に伝えるテキストです。
      </p>
    </div>
  </section>

  <!-- Contents -->
  <section id="contents" class="section section-alt">
    <div class="container">
      <h2 class="section-title">もくじ</h2>
      <ol class="toc-list">
        <li>第1章 — タイトル仮置き</li>
        <li>第2章 — タイトル仮置き</li>
        <li>第3章 — タイトル仮置き</li>
        <li>第4章 — タイトル仮置き</li>
        <li>第5章 — タイトル仮置き</li>
      </ol>
    </div>
  </section>

  <!-- Author -->
  <section id="author" class="section">
    <div class="container">
      <h2 class="section-title">著者</h2>
      <div class="author-card">
        <img src="assets/images/author.png" alt="著者アイコン" class="author-avatar" width="80" height="80">
        <div class="author-info">
          <p class="author-name">著者名</p>
          <p class="author-bio">著者の紹介文が入ります。</p>
        </div>
      </div>
    </div>
  </section>

  <!-- Purchase -->
  <section id="purchase" class="section section-alt">
    <div class="container">
      <h2 class="section-title">入手方法</h2>
      <div class="purchase-links">
        <a href="#" class="btn btn-primary">技術書典で購入</a>
        <a href="#" class="btn btn-secondary">BOOTHで購入</a>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2025 著者名</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
